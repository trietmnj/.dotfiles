[[rule]]
toolName = "run_shell_command"
commandPrefix = ["ls", "cd", "pwd", "date", "cat", "grep", "find", "head", "tail", "git status", "git diff", "git log"]
decision = "allow"
priority = 100

[[rule]]
mcpName = "zotero"
decision = "allow"
priority = 300

[[rule]]
mcpName = "context-mode"
decision = "allow"
priority = 500

[[rule]]
toolName = "cli_help"
decision = "allow"
priority = 600

[[rule]]
mcpName = "context7"
decision = "allow"
priority = 700

[[rule]]
toolName = "mcp_gemini-obsidian_obsidian_read_note"
decision = "allow"
priority = 400

[[rule]]
toolName = "activate_skill"
argsPattern = ".*\"name\":\"skill-storyline-architect\".*"
decision = "allow"
priority = 100

[[rule]]
toolName = "mcp_gemini-obsidian_obsidian_search_notes"
decision = "allow"
priority = 100

[[rule]]
toolName = "mcp_gemini-obsidian_obsidian_list_notes"
decision = "allow"
priority = 100
